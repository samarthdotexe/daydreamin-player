<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daydreamin' | Music Player</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="music-container" id="music-container">

            <div class="source-tabs">
                <button class="source-tab active" id="tab-jamendo" data-source="jamendo">
                    <i class="fas fa-compact-disc"></i> Jamendo
                </button>
                <button class="source-tab" id="tab-youtube" data-source="youtube">
                    <i class="fab fa-youtube"></i> YouTube
                </button>
            </div>

            <!-- ===================== JAMENDO PANE ===================== -->
            <div class="source-pane" id="jamendo-pane">

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search Across Daydreamin. . .">
                    <button id="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div id="search-results" class="results-container hidden"></div>


                <div class="art-stage">
                    <canvas id="visualizer" width="300" height="15"></canvas>
                    <div class="img-container">
                        <img src="image1.jpg" alt="music cover" id="cover">
                    </div>
                </div>

                <div class="music-info">
                    <h2 id="title">Song Title</h2>
                    <h3 id="artist">Artist Name</h3>

                    <button id="save-track-btn" class="save-btn" title="Save to Cloud Playlist">
                        <i class="fas fa-plus"></i> Add to Playlist
                    </button>
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>

                <div class="volume-container">
                    <i class="fas fa-volume-up" id="volume-icon"></i>
                    <input type="range" id="volume-slider" min="0" max="100" value="30">
                </div>

                <audio id="audio" crossorigin="anonymous"></audio>

                <div class="navigation">
                    <button id="prev-btn" class="action-btn">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button id="play-btn" class="action-btn action-btn-big">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="next-btn" class="action-btn">
                        <i class="fas fa-forward"></i>
                    </button>
                </div>
            </div>

            <!-- ===================== YOUTUBE PANE ===================== -->
            <div class="source-pane hidden" id="youtube-pane">

                <div class="search-box">
                    <input type="text" id="yt-search-input" placeholder="Search any track on YouTube. . .">
                    <button id="yt-search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div id="yt-search-results" class="results-container hidden"></div>

                <div class="yt-frame-wrap">
                    <div id="yt-player"></div>
                </div>

                <div class="music-info">
                    <h2 id="yt-title">Pick a track to play</h2>
                    <h3 id="yt-artist">YouTube</h3>

                    <button id="yt-save-track-btn" class="save-btn" title="Save to Cloud Playlist">
                        <i class="fas fa-plus"></i> Add to Playlist
                    </button>
                    <div class="progress-container" id="yt-progress-container">
                        <div class="progress-bar" id="yt-progress-bar"></div>
                    </div>
                </div>

                <div class="volume-container">
                    <i class="fas fa-volume-up" id="yt-volume-icon"></i>
                    <input type="range" id="yt-volume-slider" min="0" max="100" value="70">
                </div>

                <div class="navigation">
                    <button id="yt-prev-btn" class="action-btn">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button id="yt-play-btn" class="action-btn action-btn-big">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="yt-next-btn" class="action-btn">
                        <i class="fas fa-forward"></i>
                    </button>
                </div>
            </div>

        </div>
        <div class="playlist-container" id="playlist-container">
            <h3><i class="fas fa-list-music" id="playlist-icon"></i> Your Magical Playlist!</h3>
            <ul class="playlist-tracks" id="playlist-tracks">
                <li class="empty-playlist-msg">No songs saved yet. Add some tracks!</li>
            </ul>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        // Recommended-by-YouTube pattern for loading the IFrame Player API —
        // more reliable load/ready timing than a static <script src> tag.
        var ytTag = document.createElement('script');
        ytTag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(ytTag, firstScriptTag);
    </script>
</body>

</html>
